kind = "web"
previewPath = "/"
title = "AudioArchitect"
version = "1.0.0"
id = "artifacts/audio-architect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19907

[services.development]
run = "pnpm --filter @workspace/audio-architect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audio-architect", "run", "build" ]
publicDir = "artifacts/audio-architect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19907"
BASE_PATH = "/"
